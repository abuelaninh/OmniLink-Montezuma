<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Montezuma’s Revenge Demo</title>
    <style>
        body {
            background: #111;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #gameCanvas {
            border: 2px solid #fff;
            background: #000;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div id="info">Montezuma’s Revenge Demo – your agent explores the dungeon to collect the key and reach the door.
    </div>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        // Dynamic Level Management
        const levels = [
            [ // Level 1 (Original)
                '############',
                '#P    #   K#',
                '# ## ### # #',
                '#    #     #',
                '#### # #####',
                '#         D#',
                '# ## ##### #',
                '############'
            ],
            [ // Level 2
                '################',
                '#P  #      #  K#',
                '### # #### ### #',
                '#       #      #',
                '####### # #### #',
                '#  S    # #    #',
                '# ##### # # ####',
                '#                #',
                '######## ##### #',
                '#D             #',
                '################'
            ],
            [ // Level 3
                '####################',
                '#P   #K      #S    #',
                '#### ### ###### ####',
                '# S    #      #    #',
                '###### ###### #### #',
                '#      S      #    #',
                '# #### ###### # ####',
                '# #  #      # #    #',
                '# #  ###### # #### #',
                '#D#                #',
                '####################'
            ],
            [ // Level 4
                '####################',
                '#P   ######  K     #',
                '#### ### ###### ####',
                '#      #      #    #',
                '###### ###### #### #',
                '#  S   S      #    #',
                '# #### ###### # ####',
                '# #  #   S  # #    #',
                '# #  ###### # #### #',
                '#D#                #',
                '####################'
            ],
            [ // Level 5 (Hard Level)
                '####################',
                '#P   #G      #S    #',
                '#### ### ###### ####',
                '# S  #      #    # #',
                '###### ###### #### #',
                '#    W G      #  K #',
                '# #### ###### # ####',
                '# #  #      # #    #',
                '# #  ###### # #### #',
                '#D#                #',
                '####################'
            ]
        ];

        let currentLevelIndex = 0;
        let mapData = levels[currentLevelIndex];
        let grid = [];
        let player = { x: 0, y: 0 };
        let keyCollected = false;
        let roomsCleared = 0;
        let score = 0;
        let isPaused = false;
        let rows = mapData.length;
        let cols = mapData[0].length;
        let cellSize = Math.min(canvas.width / cols, canvas.height / rows);

        function loadLevel(index) {
            // Validate index or loop back
            if (index >= levels.length) {
                index = levels.length - 1; // Or loop: index = 0;
            }
            mapData = levels[index];
            rows = mapData.length;
            cols = mapData[0].length;
            cellSize = Math.min(canvas.width / cols, canvas.height / rows);

            grid = [];
            keyCollected = false;

            // Parse map and initialise grid
            for (let y = 0; y < rows; y++) {
                grid[y] = [];
                for (let x = 0; x < cols; x++) {
                    const ch = mapData[y][x] || ' ';
                    if (ch === 'P') {
                        player.x = x;
                        player.y = y;
                        grid[y][x] = ' ';
                    } else {
                        grid[y][x] = ch;
                    }
                }
            }
        }

        // Initial load
        loadLevel(currentLevelIndex);
        function drawGrid() {
            for (let y = 0; y < rows; y++) {
                for (let x = 0; x < cols; x++) {
                    const ch = grid[y][x];
                    let color;
                    switch (ch) {
                        case '#': color = '#555'; break; // wall
                        case 'K': color = '#ff0'; break; // key
                        case 'D': color = keyCollected ? '#0f0' : '#f80'; break; // door (green if key)
                        case 'S': color = '#f00'; break; // spikes
                        case 'G': color = '#800080'; break; // gate
                        case 'W': color = '#0000ff'; break; // switch
                        default: color = '#222'; break; // floor
                    }
                    ctx.fillStyle = color;
                    ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    ctx.strokeStyle = '#333';
                    ctx.strokeRect(x * cellSize, y * cellSize, cellSize, cellSize);
                }
            }
            // draw player
            ctx.fillStyle = '#0ff';
            ctx.fillRect(player.x * cellSize + cellSize * 0.25, player.y * cellSize + cellSize * 0.25, cellSize * 0.5, cellSize * 0.5);

            // Draw Score
            ctx.fillStyle = '#fff';
            ctx.font = '20px Arial';
            ctx.fillText(`Score: ${score}`, 10, 30);

            // Draw PAUSED overlay
            if (isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                ctx.font = '40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
                ctx.textAlign = 'left'; // reset
            }
        }
        // Reset map when player reaches door or hits spikes
        function resetMap(nextLevel = false) {
            if (nextLevel) {
                currentLevelIndex++;
                if (currentLevelIndex >= levels.length) {
                    console.log("Game Complete! Looping back to level 1 for endless play...");
                    currentLevelIndex = 0;
                }
                loadLevel(currentLevelIndex);
            } else {
                // Just reload the current level from scratch to reset spikes death
                loadLevel(currentLevelIndex);
            }
        }
        // Movement logic
        function tryMove(dx, dy) {
            const nx = player.x + dx;
            const ny = player.y + dy;
            if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) return;
            const cell = grid[ny][nx];
            if (cell === '#' || cell === 'G') return; // wall and gate
            if (cell === 'S') {
                // reset on spikes
                resetMap();
                return;
            }
            if (cell === 'W') {
                for (let yy = 0; yy < rows; yy++) {
                    for (let xx = 0; xx < cols; xx++) {
                        if (grid[yy][xx] === 'G' || grid[yy][xx] === 'W') {
                            grid[yy][xx] = ' ';
                        }
                    }
                }
            }
            if (cell === 'K') {
                keyCollected = true;
                grid[ny][nx] = ' ';
            }
            if (cell === 'D') {
                if (keyCollected) {
                    roomsCleared++;
                    score++; // Increment score when Door is reached
                    resetMap(true); // Proceed to next level
                    return;
                } else {
                    return; // can't open door without key
                }
            }
            player.x = nx;
            player.y = ny;
        }
        // WebSocket integration
        let gameWs;
        try {
            gameWs = new WebSocket('ws://localhost:6789/game_montezuma');
            gameWs.onopen = () => console.log('Connected to Montezuma WS server');
            gameWs.onerror = (err) => console.error('Montezuma WS error', err);
            gameWs.onclose = () => console.log('Montezuma WS connection closed');
            gameWs.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);

                    if (msg.type === 'control') {
                        if (msg.command === 'pause') {
                            isPaused = true;
                            console.log('Game Paused');
                        } else if (msg.command === 'resume') {
                            isPaused = false;
                            console.log('Game Resumed');
                        }
                    } else if (!isPaused) {
                        // Only process moves/AI if not paused
                        if (msg.type === 'action' && msg.move) {
                            if (msg.move === 'up') tryMove(0, -1);
                            else if (msg.move === 'down') tryMove(0, 1);
                            else if (msg.move === 'left') tryMove(-1, 0);
                            else if (msg.move === 'right') tryMove(1, 0);
                        } else if (msg.type === 'ai' && msg.start) {
                            startAgentAI();
                        }
                    }
                } catch (e) {
                    console.error('Error parsing Montezuma message', e);
                }
            };
        } catch (e) {
            console.error('Failed to create Montezuma WebSocket', e);
        }
        function sendGameState() {
            if (!gameWs || gameWs.readyState !== WebSocket.OPEN) return;
            // Convert grid into a compact representation: array of strings
            const gridStrings = grid.map(row => row.join ? row.join('') : row);
            const state = {
                type: 'state',
                player: { x: player.x, y: player.y },
                keyCollected: keyCollected,
                roomsCleared: roomsCleared,
                score: score,
                isPaused: isPaused,
                grid: gridStrings
            };
            try {
                gameWs.send(JSON.stringify(state));
            } catch (e) {
                console.error('Failed to send Montezuma state', e);
            }
        }
        // Built-in AI that plans a path to the key then to the door using BFS
        let agentAuto = false;
        let aiPath = [];
        function bfs(startX, startY, targetCond) {
            const visited = Array(rows).fill(0).map(() => Array(cols).fill(false));
            const queue = [];
            queue.push({ x: startX, y: startY, path: [] });
            visited[startY][startX] = true;
            while (queue.length) {
                const cur = queue.shift();
                if (targetCond(cur.x, cur.y)) {
                    return cur.path;
                }
                const dirs = [
                    { dx: 0, dy: -1, move: 'up' },
                    { dx: 0, dy: 1, move: 'down' },
                    { dx: -1, dy: 0, move: 'left' },
                    { dx: 1, dy: 0, move: 'right' }
                ];
                for (const d of dirs) {
                    const nx = cur.x + d.dx;
                    const ny = cur.y + d.dy;
                    if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) continue;
                    if (visited[ny][nx]) continue;
                    const cell = grid[ny][nx];
                    if (cell === '#' || cell === 'G') continue;
                    if (cell === 'D' && !keyCollected) continue; // can't reach door without key
                    if (cell === 'S') continue;
                    visited[ny][nx] = true;
                    queue.push({ x: nx, y: ny, path: cur.path.concat(d.move) });
                }
            }
            return [];
        }
        function startAgentAI() {
            agentAuto = true;
            aiPath = [];
        }
        function updateAgent() {
            if (!agentAuto) return;
            if (aiPath.length === 0) {
                // Determine new path: first to switch, then to key, then to door
                let hasSwitch = false;
                for (let y = 0; y < rows; y++) {
                    for (let x = 0; x < cols; x++) {
                        if (grid[y][x] === 'W') hasSwitch = true;
                    }
                }

                if (hasSwitch) {
                    aiPath = bfs(player.x, player.y, (x, y) => grid[y][x] === 'W');
                } else if (!keyCollected) {
                    aiPath = bfs(player.x, player.y, (x, y) => grid[y][x] === 'K');
                } else {
                    aiPath = bfs(player.x, player.y, (x, y) => grid[y][x] === 'D');
                }
            }
            if (aiPath.length > 0) {
                const move = aiPath.shift();
                switch (move) {
                    case 'up': tryMove(0, -1); break;
                    case 'down': tryMove(0, 1); break;
                    case 'left': tryMove(-1, 0); break;
                    case 'right': tryMove(1, 0); break;
                }
            }
        }
        // Recording setup
        let recording = true;
        const replayData = [];
        const startTime = Date.now();
        function recordState() {
            if (!recording) return;
            // capture grid as array of strings for replay
            const gridSnapshot = grid.map(row => row.join ? row.join('') : row);
            replayData.push({
                t: Date.now() - startTime,
                player: { x: player.x, y: player.y },
                keyCollected: keyCollected,
                roomsCleared: roomsCleared,
                grid: gridSnapshot
            });
        }
        function stopRecording() {
            recording = false;
            const duration = (Date.now() - startTime) / 1000;
            console.log('Montezuma session metrics:', { duration: duration, roomsCleared: roomsCleared });
            const blob = new Blob([JSON.stringify(replayData)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'montezuma_replay.json';
            a.click();
        }
        function gameLoop() {
            drawGrid();
            if (!isPaused) {
                updateAgent();
            }
            sendGameState();
            recordState();
            requestAnimationFrame(gameLoop);
        }
        drawGrid();
        requestAnimationFrame(gameLoop);
    </script>
</body>

</html>
